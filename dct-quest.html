<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCT 晉升地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans TC',sans-serif;background:#EEF8FE;min-height:100vh;overflow-x:hidden;letter-spacing:1px;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,#A7D1F3 1px,transparent 1px);background-size:30px 30px;opacity:.22;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:460px;margin:0 auto;padding-bottom:110px;}

/* ── TOPBAR ── */
.topbar{background:linear-gradient(135deg,#A7D1F3,#DBF6FF);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(55,165,230,.15);position:sticky;top:0;z-index:100;}
.tb-l{display:flex;align-items:center;gap:10px;}
.tb-av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.5);border:2px solid rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:17px;}
.tb-name{font-size:13px;font-weight:700;color:#1A5A80;}
.tb-sub{font-size:10px;color:#4A90B8;margin-top:1px;}
.tb-r{display:flex;align-items:center;gap:6px;}
.xp-pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);border-radius:999px;padding:4px 11px;font-size:11px;font-weight:700;color:#2290D4;}

/* ── HERO ── */
.hero{background:linear-gradient(160deg,#DBF6FF,#A7D1F3);padding:22px 18px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:'◆';position:absolute;right:14px;top:10px;font-size:60px;color:rgba(255,255,255,.4);}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);border-radius:999px;padding:3px 13px;font-size:10px;color:#2290D4;margin-bottom:9px;}
.hero-title{font-size:20px;font-weight:900;color:#1A5A80;line-height:1.35;margin-bottom:5px;}
.hero-desc{font-size:11px;color:#4A7A9A;line-height:1.8;margin-bottom:16px;}
.hero-stats{display:flex;justify-content:center;gap:9px;}
.hs{background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.75);border-radius:13px;padding:7px 15px;text-align:center;}
.hs-n{font-size:19px;font-weight:900;color:#2290D4;}
.hs-l{font-size:9px;color:#5A9ABB;margin-top:1px;}

/* ── STAGE STARS ── */
.stage-box{background:#fff;margin:0 14px;border-radius:0 0 18px 18px;padding:16px 16px 14px;box-shadow:0 4px 20px rgba(55,165,230,.08);margin-bottom:20px;}
.sb-title{font-size:10px;font-weight:700;color:#2290D4;letter-spacing:.1em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.sb-sub{font-size:10px;color:#90C0E0;font-weight:400;}
.stages-row{display:flex;justify-content:space-between;gap:3px;}
.stage-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.stage-star{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;border:1.5px solid #C0E4F8;background:#EEF8FE;transition:all .3s;position:relative;}
.stage-star.done{background:linear-gradient(135deg,#EEF8FE,#C0E4F8);border-color:#37A5E6;box-shadow:0 2px 8px rgba(55,165,230,.2);}
.stage-star.current{background:linear-gradient(135deg,#37A5E6,#2290D4);border-color:#2290D4;box-shadow:0 3px 12px rgba(55,165,230,.35);}
.stage-star.current .ss-icon{filter:brightness(10);}
.stage-star.locked{opacity:.4;}
.ss-icon{font-size:16px;}
.stage-lbl{font-size:8px;color:#90C0E0;text-align:center;line-height:1.3;font-weight:500;}
.stage-item.done-lbl .stage-lbl{color:#2290D4;font-weight:700;}
.stage-item.cur-lbl .stage-lbl{color:#1A7AB8;font-weight:900;}
.xp-bar-wrap{margin-top:10px;}
.xp-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.xp-lbl{font-size:10px;font-weight:700;color:#37A5E6;}
.xp-num{font-size:10px;color:#90C8E8;}
.xp-bar{height:7px;background:#EEF8FE;border-radius:999px;overflow:hidden;border:1px solid #C0E4F8;}
.xp-fill{height:100%;background:linear-gradient(90deg,#37A5E6,#A7D1F3);border-radius:999px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}

/* ── SECTION LABEL ── */
.sec-lbl{display:flex;align-items:center;gap:8px;padding:0 18px;margin-bottom:11px;}
.sl-line{flex:1;height:1px;background:linear-gradient(90deg,#A7D1F3,transparent);}
.sl-line.r{background:linear-gradient(90deg,transparent,#A7D1F3);}
.sl-txt{font-size:10px;font-weight:700;color:#37A5E6;letter-spacing:.12em;white-space:nowrap;}

/* ── LEVEL SCROLL ── */
.lv-scroll{display:flex;gap:9px;padding:0 18px;overflow-x:auto;margin-bottom:22px;scrollbar-width:none;}
.lv-scroll::-webkit-scrollbar{display:none;}
.lv-card{flex-shrink:0;width:92px;background:#fff;border:2px solid #C0E4F8;border-radius:16px;padding:11px 6px;text-align:center;cursor:pointer;transition:all .2s;position:relative;box-shadow:0 2px 10px rgba(55,165,230,.06);}
.lv-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(55,165,230,.13);}
.lv-card.active{border-color:#37A5E6;background:linear-gradient(135deg,#EEF8FE,#DBF6FF);box-shadow:0 4px 18px rgba(55,165,230,.2);}
.lv-card.lk{opacity:.38;cursor:not-allowed;}
.lv-card.lk:hover{transform:none;}
.lv-em{font-size:24px;margin-bottom:5px;}
.lv-nm{font-size:9px;font-weight:700;color:#37A5E6;margin-bottom:3px;line-height:1.3;}
.lv-pg{height:3px;background:#EEF8FE;border-radius:999px;overflow:hidden;margin-top:3px;}
.lv-pf{height:100%;background:linear-gradient(90deg,#37A5E6,#A7D1F3);border-radius:999px;}
.lv-pt{font-size:8px;color:#90C8E8;margin-top:2px;}
.lv-lock{position:absolute;top:5px;right:7px;font-size:10px;opacity:.5;}
.lv-done-badge{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#37A5E6,#2290D4);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900;box-shadow:0 2px 6px rgba(55,165,230,.3);}

/* ── QUEST AREA ── */
.qa{padding:0 14px;}
.qa-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px;}
.qa-title{font-size:15px;font-weight:900;color:#1A4A6A;}
.qa-cnt{background:#EEF8FE;border:1px solid #A7D1F3;border-radius:999px;padding:2px 10px;font-size:10px;font-weight:700;color:#37A5E6;}
.cat-row{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:5px 12px;border-radius:999px;font-size:10px;font-weight:500;border:1.5px solid #C0E4F8;background:#fff;color:#90C0E0;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:.05em;}
.cat-btn:hover{border-color:#A7D1F3;color:#37A5E6;}
.cat-btn.on{background:linear-gradient(135deg,#A7D1F3,#DBF6FF);border-color:#A7D1F3;color:#1A5A80;box-shadow:0 2px 8px rgba(55,165,230,.15);}

/* ── QUEST CARD ── */
.qc{background:#fff;border:2px solid #E8EEFF;border-radius:18px;margin-bottom:9px;overflow:hidden;transition:all .2s;box-shadow:0 2px 10px rgba(55,165,230,.04);}
.qc:hover{box-shadow:0 4px 18px rgba(55,165,230,.1);}
.qc.done{border-color:#A7D1F3;background:linear-gradient(135deg,#F5F8FF,#EEF8FE);}
.qc.lkq{opacity:.42;pointer-events:none;}
.qc.open{border-color:#A7D1F3;}
.qc-hd{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;}
.qc-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ik{background:linear-gradient(135deg,#EEF8FE,#C8EEFF);}
.ia{background:linear-gradient(135deg,#EEFFF8,#C8F0E8);}
.im{background:linear-gradient(135deg,#FFFAEE,#FFEEC8);}
.ic{background:linear-gradient(135deg,#F8EEFF,#E8D0FF);}
.qc-body{flex:1;min-width:0;}
.qc-name{font-size:12px;font-weight:700;color:#1A4A6A;margin-bottom:3px;}
.qc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.qtag{font-size:8px;padding:2px 7px;border-radius:999px;font-weight:700;}
.tk{background:#EEF6FF;color:#3A7ACC;}
.ta{background:#EEFFF4;color:#2A8A50;}
.tm{background:#FFFAEE;color:#B87820;}
.tc{background:#F8EEFF;color:#7A3ACC;}
.qxp{font-size:8px;color:#90C8E8;font-weight:700;}
.qc-ck{width:26px;height:26px;border-radius:50%;border:2px solid #C0E4F8;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:#fff;}
.qc.done .qc-ck{background:linear-gradient(135deg,#37A5E6,#2290D4);border-color:transparent;box-shadow:0 2px 6px rgba(55,165,230,.28);}
.ckv{width:10px;height:7px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px);opacity:0;transition:opacity .2s;}
.qc.done .ckv{opacity:1;}

/* ── QUEST DETAIL ── */
.qc-det{border-top:1.5px dashed #C0E4F8;padding:13px 14px 15px;animation:sd .2s ease;}
.qc.done .qc-det{border-top-color:#A7D1F3;}
@keyframes sd{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.qd-desc{font-size:11px;color:#4A7A9A;line-height:1.8;margin-bottom:11px;}
.qd-cll{margin-bottom:13px;}
.qd-cl-lbl{font-size:9px;font-weight:700;color:#37A5E6;letter-spacing:.08em;margin-bottom:7px;}
.qd-cli{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:#3A6A8A;line-height:1.6;padding:4px 0;border-bottom:1px solid #F0F4FF;}
.qd-cli:last-child{border-bottom:none;}
.qd-cli-dot{width:5px;height:5px;border-radius:50%;background:#A7D1F3;flex-shrink:0;margin-top:6px;}
.qd-rw{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#EEF8FE,#DBF6FF);border:1px solid #A7D1F3;border-radius:9px;padding:7px 11px;margin-bottom:12px;font-size:10px;color:#2290D4;font-weight:700;}
.qd-enc{font-size:11px;color:#37A5E6;font-style:italic;line-height:1.7;margin-bottom:11px;padding:8px 11px;background:#F5F8FF;border-left:3px solid #37A5E6;border-radius:0 8px 8px 0;}
.qd-btn{width:100%;padding:11px;border-radius:13px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.05em;}
.qdb-ok{background:linear-gradient(135deg,#37A5E6,#2290D4);color:#fff;box-shadow:0 3px 12px rgba(55,165,230,.3);}
.qdb-ok:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(55,165,230,.4);}
.qdb-un{background:#EEF8FE;border:1.5px solid #C0E4F8;color:#5A90BB;}
.qdb-lk{background:#F5F5F8;color:#B0BAD0;cursor:not-allowed;}
.qd-link{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:11px;background:#EEF8FE;border:1.5px solid #A7D1F3;color:#2290D4;font-size:12px;font-weight:700;text-decoration:none;margin-bottom:10px;letter-spacing:.05em;transition:all .2s;}
.qd-link:hover{background:#DBF6FF;border-color:#37A5E6;}

/* ── BOTTOM NAV ── */
.bnt{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:#fff;border-top:1.5px solid #E4ECFF;padding:8px 0;display:flex;justify-content:space-around;z-index:100;box-shadow:0 -4px 18px rgba(55,165,230,.07);}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 14px;border-radius:11px;transition:all .15s;}
.bni.on{background:#EEF8FE;}
.bni-ic{font-size:19px;}
.bni-lb{font-size:9px;color:#9AB0D0;font-weight:500;letter-spacing:.05em;}
.bni.on .bni-lb{color:#37A5E6;font-weight:700;}

/* ── OVERLAY ── */
.ovl{position:fixed;inset:0;background:rgba(10,20,60,.55);display:flex;align-items:center;justify-content:center;z-index:999;animation:fi .2s ease;padding:20px;}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* ── QUEST COMPLETE POPUP ── */
.pop-quest{background:#fff;border-radius:24px;padding:26px 22px;text-align:center;max-width:300px;width:100%;box-shadow:0 20px 60px rgba(55,165,230,.25);animation:pi .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes pi{from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
.pq-em{font-size:48px;display:block;margin-bottom:6px;animation:bo 1s ease infinite alternate;}
@keyframes bo{from{transform:translateY(0)}to{transform:translateY(-7px)}}
.pq-stars{display:flex;justify-content:center;gap:5px;margin-bottom:11px;}
.pqs{font-size:22px;}
.pqs.lit{animation:sp .4s ease;}
@keyframes sp{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.pq-title{font-size:16px;font-weight:900;color:#1A4A6A;margin-bottom:5px;}
.pq-enc{font-size:11px;color:#4A7A9A;line-height:1.75;margin-bottom:8px;padding:0 4px;}
.pq-xp{display:inline-flex;align-items:center;gap:4px;background:#EEF8FE;border:1px solid #A7D1F3;border-radius:999px;padding:4px 12px;font-size:11px;font-weight:700;color:#2290D4;margin-bottom:14px;}
.pq-btn{width:100%;padding:11px;border-radius:13px;background:linear-gradient(135deg,#37A5E6,#2290D4);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(55,165,230,.32);transition:all .2s;font-family:inherit;letter-spacing:.05em;}
.pq-btn:hover{transform:translateY(-1px);}

/* ── CERTIFICATE ── */
.cert{background:#fff;border-radius:24px;padding:0;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(55,165,230,.3);animation:pi .4s cubic-bezier(.34,1.56,.64,1);overflow:hidden;}
.cert-top{background:linear-gradient(135deg,#A7D1F3,#DBF6FF);padding:28px 24px 22px;text-align:center;position:relative;overflow:hidden;}
.cert-top::before{content:'◆';position:absolute;left:10px;top:8px;font-size:50px;color:rgba(255,255,255,.3);}
.cert-top::after{content:'◆';position:absolute;right:10px;bottom:8px;font-size:36px;color:rgba(255,255,255,.3);}
.cert-badge-icon{font-size:52px;display:block;margin-bottom:8px;animation:bo 1.2s ease infinite alternate;}
.cert-stage-name{font-size:11px;letter-spacing:.2em;color:#4A7A9A;margin-bottom:6px;text-transform:uppercase;}
.cert-title{font-size:18px;font-weight:900;color:#1A5A80;line-height:1.35;margin-bottom:4px;}
.cert-subtitle{font-size:10px;color:#5A9ABB;letter-spacing:.08em;}
.cert-body{padding:20px 22px 22px;}
.cert-seal{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;}
.cert-seal-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,#A7D1F3);}
.cert-seal-line.r{background:linear-gradient(90deg,#A7D1F3,transparent);}
.cert-seal-txt{font-size:9px;color:#90C0E0;letter-spacing:.12em;font-weight:700;}
.cert-msg{font-size:12px;color:#2A5A7A;line-height:1.85;text-align:center;margin-bottom:16px;}
.cert-msg strong{color:#2290D4;font-weight:700;}
.cert-quote{font-size:11px;color:#37A5E6;font-style:italic;line-height:1.75;text-align:center;padding:10px 14px;background:#EEF8FE;border-radius:10px;margin-bottom:16px;border-left:3px solid #37A5E6;}
.cert-meta{display:flex;justify-content:space-between;font-size:9px;color:#9AB0D0;margin-bottom:16px;padding:0 2px;}
.cert-btns{display:flex;gap:8px;}
.cert-btn-save{flex:1;padding:10px;border-radius:12px;background:linear-gradient(135deg,#37A5E6,#2290D4);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;letter-spacing:.05em;box-shadow:0 3px 10px rgba(55,165,230,.28);}
.cert-btn-next{flex:1;padding:10px;border-radius:12px;background:#EEF8FE;border:1.5px solid #A7D1F3;color:#37A5E6;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.05em;}

/* ── MILESTONE CARD ── */
.milestone-card{background:#fff;border-radius:24px;padding:0;max-width:300px;width:100%;box-shadow:0 20px 60px rgba(55,165,230,.2);animation:pi .4s cubic-bezier(.34,1.56,.64,1);overflow:hidden;}
.ms-top{background:linear-gradient(135deg,#DBF6FF,#A7D1F3);padding:26px 20px 18px;text-align:center;position:relative;}
.ms-top::after{content:'★';position:absolute;right:14px;top:10px;font-size:48px;color:rgba(255,255,255,.35);}
.ms-icon{font-size:50px;display:block;margin-bottom:6px;animation:bo 1s ease infinite alternate;}
.ms-title{font-size:18px;font-weight:900;color:#1A5A80;margin-bottom:4px;}
.ms-sub{font-size:11px;color:#4A7A9A;letter-spacing:.06em;}
.ms-body{padding:20px 20px 22px;}
.ms-msg{font-size:12px;color:#3A6A8A;line-height:1.85;text-align:center;margin-bottom:14px;}
.ms-stars{display:flex;justify-content:center;gap:4px;margin-bottom:14px;}
.ms-star-chip{display:flex;align-items:center;gap:4px;background:#EEF8FE;border:1.5px solid #A7D1F3;border-radius:999px;padding:5px 14px;font-size:13px;font-weight:900;color:#2290D4;}
.ms-quote{font-size:11px;color:#37A5E6;font-style:italic;text-align:center;line-height:1.75;padding:9px 12px;background:#EEF8FE;border-radius:10px;margin-bottom:16px;border-left:3px solid #A7D1F3;}
.ms-btn{width:100%;padding:11px;border-radius:13px;background:linear-gradient(135deg,#A7D1F3,#DBF6FF);color:#1A5A80;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;letter-spacing:.05em;box-shadow:0 3px 10px rgba(55,165,230,.2);}
/* ── WELCOME SCREEN ── */
.welcome{position:fixed;inset:0;background:#EEF8FE;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;}
.welcome-box{background:#fff;border-radius:28px;padding:36px 28px;text-align:center;max-width:320px;width:100%;box-shadow:0 12px 40px rgba(55,165,230,.15);}
.wc-icon{font-size:52px;margin-bottom:12px;display:block;animation:bo 1.5s ease infinite alternate;}
.wc-title{font-size:20px;font-weight:900;color:#1A5A80;margin-bottom:6px;}
.wc-desc{font-size:12px;color:#5A9ABB;line-height:1.8;margin-bottom:24px;}
.wc-label{font-size:11px;font-weight:700;color:#37A5E6;letter-spacing:.08em;margin-bottom:8px;text-align:left;}
.wc-input{width:100%;padding:13px 16px;border-radius:14px;border:2px solid #A7D1F3;font-size:16px;font-family:inherit;color:#1A5A80;background:#EEF8FE;outline:none;letter-spacing:.05em;transition:border-color .2s;margin-bottom:16px;}
.wc-input:focus{border-color:#37A5E6;background:#fff;}
.wc-input::placeholder{color:#A7C8E0;}
.wc-btn{width:100%;padding:13px;border-radius:14px;background:linear-gradient(135deg,#A7D1F3,#DBF6FF);color:#1A5A80;font-size:14px;font-weight:900;border:none;cursor:pointer;font-family:inherit;letter-spacing:.08em;box-shadow:0 4px 14px rgba(55,165,230,.2);transition:all .2s;}
.wc-btn:hover{transform:translateY(-1px);}
.wc-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.wc-note{font-size:10px;color:#90C0E0;margin-top:12px;line-height:1.6;}

/* ── CONFETTI ── */
.cf{position:fixed;pointer-events:none;z-index:1000;border-radius:2px;animation:cff linear forwards;}
@keyframes cff{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="welcome" id="welcome">
  <div class="welcome-box">
    <span class="wc-icon">🌟</span>
    <div class="wc-title">歡迎加入 DCT</div>
    <div class="wc-desc">輸入你的名字<br>開始你專屬的晉升闖關之旅！</div>
    <div class="wc-label">你的名字</div>
    <input class="wc-input" id="wc-name" type="text" placeholder="例如：小安、Annie…" maxlength="10">

function loadName(){

function saveName(n){
  localStorage.setItem(NK, n);
}

function applyName(name){
  userName = name;
  document.getElementById('tb-name').textContent = name ? name+'的晉升地圖' : '我的晉升地圖';
  document.getElementById('hero-title').innerHTML = name
    ? `<span style="color:#37A5E6">${name}</span>，每一步都算數<br>你比昨天更強了`
    : '每一步都算數<br>你比昨天更強了';
}

function editName(){
  const wc = document.getElementById('welcome');
  const inp = document.getElementById('wc-name');
  inp.value = userName || '';
  document.getElementById('wc-btn').disabled = inp.value.trim().length === 0;
  wc.style.animation='';
  wc.style.display='flex';
  setTimeout(()=>inp.focus(),100);
}
  const input = document.getElementById('wc-name').value.trim();
  if(!input) return;
  saveName(input);
  applyName(input);
  const wc = document.getElementById('welcome');
  wc.style.animation='fadeOut .3s ease forwards';
  setTimeout(()=>wc.style.display='none', 300);
}

// Listen for input changes to enable/disable button
document.addEventListener('DOMContentLoaded', ()=>{
  const inp = document.getElementById('wc-name');
  const btn = document.getElementById('wc-btn');
  inp.addEventListener('input', ()=>{
    btn.disabled = inp.value.trim().length === 0;
  });
  inp.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && inp.value.trim()) startWithName();
  });

  // Check if name already saved

  if(saved){

    document.getElementById('welcome').style.display='none';
  }
});

let P={}, ci=0, cc='全部', oq=null;
function load(){ try{ P=JSON.parse(localStorage.getItem(SK)||'{}'); }catch(e){ P={}; } }
function save(){ localStorage.setItem(SK,JSON.stringify(P)); }
function k(li,id){ return 'l'+li+'_'+id; }
function done(li,id){ return !!P[k(li,id)]; }
function mk(li,id){ P[k(li,id)]=true; save(); }
function um(li,id){ delete P[k(li,id)]; save(); }
function ulk(li,q){ return !q.ul||done(li,q.ul); }
function ndone(li){ return LV[li].qs.filter(q=>done(li,q.id)).length; }
function totDone(){ let d=0; LV.forEach((_,i)=>d+=ndone(i)); return d; }
function totQ(){ let t=0; LV.forEach(lv=>t+=lv.qs.length); return t; }
function totXP(){ let x=0; LV.forEach((lv,i)=>lv.qs.forEach(q=>{ if(done(i,q.id))x+=q.xp; })); return x; }
function stagesDone(){ return LV.filter((_,i)=>ndone(i)===LV[i].qs.length).length; }

function randEnc(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function rHdr(){
  const td=totDone(), tq=totQ(), tx=totXP();
  document.getElementById('s-done').textContent=td;
  document.getElementById('s-tot').textContent=tq;
  document.getElementById('s-pct').textContent=tq?Math.round(td/tq*100)+'%':'0%';
  document.getElementById('tot-xp').textContent=tx;
  const lv=LV[ci];
  document.getElementById('lv-tag').textContent=lv.name+' · 階段 '+(ci+1);
  const lxp=lv.qs.reduce((s,q)=>done(ci,q.id)?s+q.xp:s,0);
  document.getElementById('cx').textContent=lxp;
  document.getElementById('mx').textContent=lv.xpMax;
  document.getElementById('xf').style.width=Math.min(100,Math.round(lxp/lv.xpMax*100))+'%';
  const sd=stagesDone();
  document.getElementById('stage-sub').textContent=sd+' / 7 階段完成';
}

function rStages(){
  document.getElementById('stages-row').innerHTML=STAGES.map((s,i)=>{
    const all=ndone(i)===LV[i].qs.length;
    const isCur=i===ci;
    const lk=i>0&&!( ndone(i-1)===LV[i-1].qs.length );
    let cls='stage-star';
    if(all) cls+=' done';
    else if(isCur) cls+=' current';
    else if(lk) cls+=' locked';
    let itemCls='stage-item';
    if(all) itemCls+=' done-lbl';
    else if(isCur) itemCls+=' cur-lbl';
    return `<div class="${itemCls}" onclick="setLv(${i})">
      <div class="${cls}"><span class="ss-icon">${s.emoji}</span></div>
      <div class="stage-lbl">${s.short}</div>
    </div>`;
  }).join('');
}

function rLvNav(){
  document.getElementById('lv-scroll').innerHTML=LV.map((lv,i)=>{
    const d=ndone(i), t=lv.qs.length, p=Math.round(d/t*100);
    const lk=i>0&&ndone(i-1)<LV[i-1].qs.length, all=d===t;
    return `<div class="lv-card${i===ci?' active':''}${lk?' lk':''}" onclick="${lk?'':'setLv('+i+')'}">
      ${lk?'<div class="lv-lock">🔒</div>':''}
      ${all?'<div class="lv-done-badge">✓</div>':''}
      <div class="lv-em">${lv.em}</div>
      <div class="lv-nm">${lv.name}</div>
      <div class="lv-pg"><div class="lv-pf" style="width:${p}%"></div></div>
      <div class="lv-pt">${d}/${t}</div>
    </div>`;
  }).join('');
}

function rTabs(){
  document.getElementById('cat-row').innerHTML=LV[ci].cats.map(c=>
    `<button class="cat-btn${cc===c?' on':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function rQuests(){
  const lv=LV[ci]; let qs=lv.qs;
  if(cc!=='全部') qs=qs.filter(q=>q.cat===cc);
  const d=ndone(ci), t=lv.qs.length;
  document.getElementById('qa-title').textContent=lv.em+' '+lv.name;
  document.getElementById('qa-cnt').textContent=d+'/'+t;
  const im={k:'ik',a:'ia',m:'im',c:'ic'}, tm={k:'tk',a:'ta',m:'tm',c:'tc'}, tn={k:'知識',a:'行動',m:'心態',c:'挑戰'};
  document.getElementById('qlist').innerHTML=qs.map(q=>{
    const qk=k(ci,q.id), d=done(ci,q.id), u=ulk(ci,q), op=oq===qk;
    return `<div class="qc${d?' done':''}${!u?' lkq':''}${op?' open':''}" id="qc-${qk}">
      <div class="qc-hd" onclick="tog('${qk}')">
        <div class="qc-ico ${im[q.tp]}">${q.em}</div>
        <div class="qc-body">
          <div class="qc-name">${q.name}</div>
          <div class="qc-meta">
            <span class="qtag ${tm[q.tp]}">${tn[q.tp]}</span>
            <span class="qxp">⭐+${q.xp}</span>
            ${!u?'<span class="qxp">🔒先完成前一關</span>':''}
            ${d?'<span class="qxp" style="color:#37A5E6">✓完成</span>':''}
          </div>
        </div>
        <div class="qc-ck"><div class="ckv"></div></div>
      </div>
      ${op?`<div class="qc-det">
        <div class="qd-desc">${q.desc}</div>
        <div class="qd-cll">
          <div class="qd-cl-lbl">✦ 完成這關你需要</div>
          ${(q.cl||[]).map(c=>`<div class="qd-cli"><div class="qd-cli-dot"></div>${c}</div>`).join('')}
        </div>
        ${q.enc?`<div class="qd-enc">${q.enc}</div>`:''}
        ${q.link?`<a class="qd-link" href="${q.link}" target="_blank">${q.linkTxt||'▶ 觀看影片'}</a>`:''}
        <div class="qd-rw">🏅 完成獎勵：+${q.xp} 星星</div>
        ${u
          ? d
            ? `<button class="qd-btn qdb-un" onclick="undoQ(${ci},'${q.id}',event)">取消完成</button>`
            : `<button class="qd-btn qdb-ok" onclick="compQ(${ci},'${q.id}','${q.name}',${q.xp},'${(q.enc||'').replace(/'/g,"\\'")}',event)">完成這一關 ✓</button>`
          : `<button class="qd-btn qdb-lk" disabled>🔒 先完成前一關</button>`
        }
      </div>`:''}
    </div>`;
  }).join('');
}

function confetti(){
  const cols=['#37A5E6','#7AA0FF','#A0C0FF','#2290D4','#FFD700','#fff'];
  for(let i=0;i<30;i++){
    const e=document.createElement('div'); e.className='cf';
    e.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.4}s;animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(e); setTimeout(()=>e.remove(),2800);
  }
}

const MILESTONES = [
  {stars:50,  icon:'🌟', title:'50顆星！閃閃發光', msg:'你已經累積了50顆星星！\n這代表你完成了很多關卡，\n每一顆星都是你努力的痕跡。', quote:'「開始了，就不要停。停下來的代價比繼續更大。」'},
  {stars:100, icon:'💫', title:'100顆星！勢不可擋', msg:'100顆星星！\n很多人在這裡早就放棄了，\n但你還在，這就是你和別人的差距。', quote:'「你以為自己在原地踏步，\n其實你每天都在累積你看不見的能量。」'},
  {stars:150, icon:'✨', title:'150顆星！你是傳奇', msg:'150顆星！\n你已經走了很長的路了。\n繼續走，最好的還在前面。', quote:'「三年後你會感謝現在沒有放棄的自己。」'},
  {stars:200, icon:'👑', title:'200顆星！皇家之路', msg:'200顆星！\n你幾乎走完了整個旅程。\n皇家的那一天，不遠了。', quote:'「不是因為容易才堅持，\n是因為值得才繼續。」'},
];

function checkMilestone(prevXP, newXP){
  for(const m of MILESTONES){
    if(prevXP < m.stars && newXP >= m.stars) return m;
  }
  return null;
}

function showMilestone(m, totalXP){
  document.getElementById('ovl-content').innerHTML=`
    <div class="milestone-card">
      <div class="ms-top">
        <span class="ms-icon">${m.icon}</span>
        <div class="ms-title">${m.title}</div>
        <div class="ms-sub">累積星星里程碑</div>
      </div>
      <div class="ms-body">
        <div class="ms-stars"><div class="ms-star-chip">⭐ ${totalXP} 顆星星</div></div>
        <div class="ms-msg">${m.msg.replace(/\n/g,'<br>')}</div>
        <div class="ms-quote">${m.quote}</div>
        <button class="ms-btn" onclick="closeOvl()">繼續前進，我做得到 ✦</button>
      </div>
    </div>`;
  confetti(); confetti();
  document.getElementById('ovl').style.display='flex';
}

function compQ(li, id, name, xp, enc, e){
  e.stopPropagation();
  const prevXP = totXP();
  mk(li,id); oq=null; rAll();
  const newXP = totXP();
  const d=ndone(li), t=LV[li].qs.length, all=d===t;
  const st=d>=t*.75?3:d>=t*.4?2:1;
  confetti();

  const milestone = checkMilestone(prevXP, newXP);
  if(milestone){
    setTimeout(()=>showMilestone(milestone, newXP), 400);
  } else if(all){
    showCert(li);
  } else {
    const encTxt = enc || randEnc(ENCOURAGEMENTS.quest);
    showQuestPop(name, xp, st, encTxt, li);
  }
}

function showQuestPop(name, xp, st, enc, li){
  document.getElementById('ovl-content').innerHTML=`
    <div class="pop-quest">
      <span class="pq-em">✨</span>
      <div class="pq-stars">${[1,2,3].map(i=>`<span class="pqs${i<=st?' lit':''}">★</span>`).join('')}</div>
      <div class="pq-title">「${name}」完成！</div>
      <div class="pq-enc">${enc}</div>
      <div class="pq-xp">⭐ +${xp} 星星</div>
      <button class="pq-btn" onclick="closeOvl()">繼續前進 →</button>
    </div>`;
  document.getElementById('ovl').style.display='flex';
}

function showCert(li){
  const lv=LV[li], stage=STAGES[li];
  const now=new Date();
  const dateStr=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
  const msgs=[
    `${userName ? userName+'，你' : '你'}完成了「${stage.name}」階段的所有關卡。`,
    `這不是一件容易的事，但你做到了。`,
    `把這張獎狀截圖存起來，它是你努力過的證明。`,
  ];
  const nextLv = li<LV.length-1 ? LV[li+1] : null;
  document.getElementById('ovl-content').innerHTML=`
    <div class="cert">
      <div class="cert-top">
        <span class="cert-badge-icon">${stage.emoji}</span>
        <div class="cert-stage-name">DCT 晉升認證</div>
        <div class="cert-title">${userName ? userName+'<br>' : ''}${stage.name}<br>階段完成</div>
        <div class="cert-subtitle">第 ${li+1} 階段 · 共 7 階段</div>
      </div>
      <div class="cert-body">
        <div class="cert-seal">
          <div class="cert-seal-line"></div>
          <div class="cert-seal-txt">✦ CERTIFICATE ✦</div>
          <div class="cert-seal-line r"></div>
        </div>
        <div class="cert-msg">${msgs.join('<br>')}</div>
        <div class="cert-quote">${lv.cert_quote}</div>
        <div class="cert-meta">
          <span>完成日期：${dateStr}</span>
          <span>DCT 晉升地圖</span>
        </div>
        <div class="cert-btns">
          <button class="cert-btn-save" onclick="closeOvl()">截圖存起來 📸</button>
          ${nextLv
            ? `<button class="cert-btn-next" onclick="closeOvl();setLv(${li+1})">前往${nextLv.name} →</button>`
            : `<button class="cert-btn-next" onclick="closeOvl()">感謝這段旅程 🙏</button>`
          }
        </div>
      </div>
    </div>`;
  confetti(); confetti();
  document.getElementById('ovl').style.display='flex';
}

function undoQ(li, id, e){ e.stopPropagation(); um(li,id); oq=null; rAll(); }
function closeOvl(){ document.getElementById('ovl').style.display='none'; }
function setLv(i){ ci=i; cc='全部'; oq=null; rAll(); }
function setCat(c){ cc=c; oq=null; rTabs(); rQuests(); }
function tog(qk){ oq=oq===qk?null:qk; rQuests(); }
function rAll(){ rHdr(); rStages(); rLvNav(); rTabs(); rQuests(); }

load(); rAll();
</script>
