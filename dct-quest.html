    {id:'b',cat:'✅行動',tp:'a',em:'📊',name:'建立客戶追蹤表格',xp:20,ul:'a',desc:'用表格記錄每位客戶的購買記錄、使用狀況和回購時間，讓服務更精準！',cl:['建立客戶基本資料記錄','設定回購提醒時間','每週主動關心至少3位客戶']},
    {id:'c',cat:'🎯挑戰',tp:'c',em:'🎯',name:'完成第一個月銷售目標',xp:25,ul:'b',desc:'根據你目前的狀況設定合理的月目標並全力完成它！',cl:['設定明確的月銷售目標','每週追蹤進度並調整策略','達標後分析3個成功關鍵']},
  ]},
  {id:'l5',name:'工具掌握',em:'🛠️',xpMax:50,cats:['全部','📖知識','✅行動'],qs:[
    {id:'a',cat:'📖知識',tp:'k',em:'🎬',name:'下載並設定剪映',xp:10,ul:null,desc:'剪映是你最重要的剪片工具！學會基礎操作，讓你的影片更有質感。',cl:['下載並安裝剪映','了解基本剪輯功能','購買適合的會員方案']},
    {id:'b',cat:'✅行動',tp:'a',em:'🎥',name:'完成第一支剪輯影片',xp:15,ul:'a',desc:'用剪映剪出你的第一支成品，不需要完美，先完成再完美！',cl:['剪完一支完整的影片','加入字幕與背景音樂','發給上家請求回饋']},
    {id:'c',cat:'📖知識',tp:'k',em:'🛒',name:'架設賣貨便收款系統',xp:15,ul:'b',desc:'不要用蝦皮！賣貨便手續費更低。學會架設你的賣貨便頁面。',cl:['註冊並設定賣貨便帳號','上架至少一個商品','測試完整的購買流程']},
    {id:'d',cat:'✅行動',tp:'a',em:'💡',name:'備齊拍攝基本設備',xp:10,ul:null,desc:'好的腳架和補光燈能讓你的影片質感大幅提升！',cl:['購入或借到穩固的腳架','準備補光燈（環形燈最推薦）','測試最佳拍攝角度']},
  ]},
  {id:'l6',name:'晉升準備',em:'👑',xpMax:80,cats:['全部','📖知識','✅行動','💛心態','🎯挑戰'],qs:[
    {id:'a',cat:'📖知識',tp:'k',em:'📋',name:'了解晉升二級的完整條件',xp:15,ul:null,desc:'搞清楚晉升的每一個條件，制定你的衝刺計畫，清楚目標才能有效率達成！',cl:['了解業績門檻與時間限制','知道需要多少推薦人數','和上家確認目前的進度']},
    {id:'b',cat:'💛心態',tp:'m',em:'🌱',name:'建立長期經營的心態',xp:10,ul:'a',desc:'這不是一份快速致富的工作，而是值得長期投入的事業，調整期待值才能走更遠。',cl:['寫下你加入DCT最深層的原因','設定3個月、6個月的目標','和上家分享你的長期規劃']},
    {id:'c',cat:'✅行動',tp:'a',em:'🤝',name:'找到第一位有興趣的夥伴',xp:25,ul:'b',desc:'不是要你馬上「成交」，而是找到一位願意多了解的人，約好下次深入談話。',cl:['邀請對象聽完完整說明','耐心回答所有的問題','約定好後續跟進的明確時間']},
    {id:'d',cat:'🎯挑戰',tp:'c',em:'🚀',name:'完成晉升前最終衝刺',xp:30,ul:'c',desc:'距離晉升只差最後一步！和上家一起制定衝刺計畫，全力以赴！',cl:['確認所有晉升條件的達成狀況','制定最後衝刺的行動計畫','完成並通知上家確認晉升']},
  ]},
];
let P={},ci=0,cc='全部',oq=null;
function load(){try{P=JSON.parse(localStorage.getItem(SK)||'{}');}catch(e){P={};}}
function save(){localStorage.setItem(SK,JSON.stringify(P));}
function k(li,id){return 'l'+li+'_'+id;}
function done(li,id){return !!P[k(li,id)];}
function mk(li,id){P[k(li,id)]=true;save();}
function um(li,id){delete P[k(li,id)];save();}
function ul(li,q){return !q.ul||done(li,q.ul);}
function ndone(li){return LV[li].qs.filter(q=>done(li,q.id)).length;}
function totDone(){let d=0;LV.forEach((_,i)=>d+=ndone(i));return d;}
function totQ(){let t=0;LV.forEach(lv=>t+=lv.qs.length);return t;}
function totXP(){let x=0;LV.forEach((lv,i)=>lv.qs.forEach(q=>{if(done(i,q.id))x+=q.xp;}));return x;}
function rHdr(){
  const td=totDone(),tq=totQ(),tx=totXP();
  document.getElementById('s-done').textContent=td;
  document.getElementById('s-tot').textContent=tq;
  document.getElementById('s-pct').textContent=tq?Math.round(td/tq*100)+'%':'0%';
  document.getElementById('tot-xp').textContent=tx;
  const lv=LV[ci];
  document.getElementById('lv-tag').textContent=lv.name+' · Lv.'+(ci+1);
  const lxp=lv.qs.reduce((s,q)=>done(ci,q.id)?s+q.xp:s,0);
  document.getElementById('cx').textContent=lxp;
  document.getElementById('mx').textContent=lv.xpMax;
  document.getElementById('xf').style.width=Math.min(100,Math.round(lxp/lv.xpMax*100))+'%';
}
function rLvNav(){
  document.getElementById('lv-scroll').innerHTML=LV.map((lv,i)=>{
    const d=ndone(i),t=lv.qs.length,p=Math.round(d/t*100);
    const lk=i>0&&ndone(i-1)<LV[i-1].qs.length,all=d===t;
    return `<div class="lv-card${i===ci?' active':''}${lk?' lk':''}" onclick="${lk?'':'setLv('+i+')'}">
      ${lk?'<div class="lv-lock">🔒</div>':''}${all?'<div class="lv-done">✓</div>':''}
      <div class="lv-em">${lv.em}</div><div class="lv-nm">${lv.name}</div>
      <div class="lv-pg"><div class="lv-pf" style="width:${p}%"></div></div>
      <div class="lv-pt">${d}/${t}</div></div>`;
  }).join('');
}
function rTabs(){
  document.getElementById('cat-row').innerHTML=LV[ci].cats.map(c=>
    `<div class="cat-btn${cc===c?' on':''}" onclick="setCat('${c}')">${c}</div>`).join('');
}
function rQuests(){
  const lv=LV[ci];let qs=lv.qs;
  if(cc!=='全部')qs=qs.filter(q=>q.cat===cc);
  const d=ndone(ci),t=lv.qs.length;
  document.getElementById('qa-title').textContent=lv.em+' '+lv.name;
  document.getElementById('qa-cnt').textContent=d+'/'+t;
  const im={k:'ik',a:'ia',m:'im',c:'ic'},tm={k:'tk',a:'ta',m:'tm',c:'tc'},tn={k:'知識',a:'行動',m:'心態',c:'挑戰'};
  document.getElementById('qlist').innerHTML=qs.map(q=>{
    const qk=k(ci,q.id),d=done(ci,q.id),u=ul(ci,q),op=oq===qk;
    return `<div class="qc${d?' done':''}${!u?' lkq':''}${op?' open':''}" id="qc-${qk}">
      <div class="qc-hd" onclick="tog('${qk}')">
        <div class="qc-ico ${im[q.tp]}">${q.em}</div>
        <div class="qc-body">
          <div class="qc-name">${q.name}</div>
          <div class="qc-meta">
            <span class="qtag ${tm[q.tp]}">${tn[q.tp]}</span>
            <span class="qxp">⭐+${q.xp}XP</span>
            ${!u?'<span class="qxp">🔒先完成前一關</span>':''}
            ${d?'<span class="qxp" style="color:#639922">✓已完成</span>':''}
          </div>
        </div>
        <div class="qc-ck"><div class="ckv"></div></div>
      </div>
      ${op?`<div class="qc-det">
        <div class="qd-desc">${q.desc}</div>
        <div class="qd-cll"><div class="qd-cl-lbl">✦ 完成這關你需要</div>
          ${(q.cl||[]).map(c=>`<div class="qd-cli"><span>🌸</span>${c}</div>`).join('')}
        </div>
        <div class="qd-rw">🏆 完成獎勵：+${q.xp} 冒險能量 XP</div>
        ${u?d?`<button class="qd-btn qdb-un" onclick="undo(${ci},'${q.id}',event)">取消完成</button>`
            :`<button class="qd-btn qdb-ok" onclick="comp(${ci},'${q.id}','${q.name}',${q.xp},event)">✨ 完成這一關！</button>`
          :`<button class="qd-btn qdb-lk" disabled>🔒 先解鎖前一關</button>`}
      </div>`:''}
    </div>`;
  }).join('');
}
function confetti(){
  const cols=['#FF6EB4','#FFB3D9','#A8E063','#FFE66D','#74C0FC'];
  for(let i=0;i<26;i++){
    const e=document.createElement('div');e.className='cf';
    e.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.2}s;animation-delay:${Math.random()*.3}s;`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),2600);
  }
}
function comp(li,id,name,xp,e){
  e.stopPropagation();mk(li,id);oq=null;rAll();
  const d=ndone(li),t=LV[li].qs.length,all=d===t,st=d>=t*.75?3:d>=t*.4?2:1;
  confetti();
  document.getElementById('ov-em').textContent=all?'🎊':'✨';
  document.getElementById('ov-stars').innerHTML=[1,2,3].map(i=>`<span class="ovs${i<=st?' lit':''}">★</span>`).join('');
  document.getElementById('ov-title').textContent=all?'「'+LV[li].name+'」全破關！':'「'+name+'」完成！';
  document.getElementById('ov-desc').textContent=all?'太厲害了！完成所有挑戰，準備好迎接下一個冒險了嗎？':'做得好！繼續挑戰剩下的關卡吧！';
  document.getElementById('ov-xp').textContent='⭐ +'+xp+' XP';
  const btn=document.getElementById('ov-btn');
  if(all&&li<LV.length-1){btn.textContent='前往下一章節 🚀';btn.onclick=()=>{closeOv();setLv(li+1);};}
  else{btn.textContent='繼續冒險 →';btn.onclick=closeOv;}
  document.getElementById('ovl').style.display='flex';
}
function undo(li,id,e){e.stopPropagation();um(li,id);oq=null;rAll();}
function closeOv(){document.getElementById('ovl').style.display='none';}
function setLv(i){ci=i;cc='全部';oq=null;rAll();}
function setCat(c){cc=c;oq=null;rTabs();rQuests();}
function tog(qk){oq=oq===qk?null:qk;rQuests();}
function rAll(){rHdr();rLvNav();rTabs();rQuests();}
load();rAll();
</script>
